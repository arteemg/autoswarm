pipeline:
  max_total_turns: 30 # shared budget across all stages
  model: gpt-5 # default model for all stages; override per stage

  stages:
    - id: vanilla-agent
      system_prompt: |
        "You are an agent that executes tasks"
      tools: [run_shell]
      max_turns: 30
      output_format: bullet_list # meta-agent can change: bullet_list | json | prose | structured_json

  handoffs:
    explore→plan:
      token_budget: 600
      format: bullet_list
      include_raw_output: false

    plan→execute:
      token_budget: 800
      format: structured_json
      include_raw_output: false

    execute→verify:
      token_budget: 400
      format: prose
      include_raw_output: true # verify needs to see actual outputs
