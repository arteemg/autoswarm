pipeline:
  max_total_turns: 30   # shared budget across all stages
  model: gpt-5          # default model for all stages; override per stage

  stages:
    - id: explore
      system_prompt: |
        You are a terminal exploration agent. Your job is to understand
        the environment state before any execution begins. Read files,
        check what tools are available, understand the task structure.
        Do NOT execute the solution yet.
      tools: [run_shell]
      max_turns: 8
      output_format: bullet_list   # meta-agent can change: bullet_list | json | prose | structured_json

    - id: plan
      system_prompt: |
        You are a planning agent. Given exploration results and the task,
        produce a concrete step-by-step execution plan. Be specific about
        exact commands. Flag risks and fallbacks.
      tools: []                    # no shell access — pure reasoning
      max_turns: 4
      output_format: structured_json

    - id: execute
      system_prompt: |
        You are an execution agent. Follow the plan exactly. If a step fails,
        adapt minimally. Do not re-explore. Execute and produce the output.
      tools: [run_shell]
      max_turns: 15
      output_format: prose

    - id: verify
      system_prompt: |
        You are a verification agent. Check that the task was actually completed
        correctly. Re-read outputs, run validation commands. If something is wrong,
        report exactly what failed and why.
      tools: [run_shell]
      max_turns: 5
      output_format: structured_json

  handoffs:
    explore→plan:
      token_budget: 600
      format: bullet_list
      include_raw_output: false

    plan→execute:
      token_budget: 800
      format: structured_json
      include_raw_output: false

    execute→verify:
      token_budget: 400
      format: prose
      include_raw_output: true    # verify needs to see actual outputs
